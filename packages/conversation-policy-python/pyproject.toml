[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sciforge-conversation-policy"
version = "0.1.0"
description = "SciForge conversation policy decisions"
requires-python = ">=3.10"
authors = [{ name = "SciForge" }]
license = { text = "UNLICENSED" }
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
include = ["sciforge_conversation*"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
