[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sciforge-computer-use"
version = "0.1.0"
description = "SciForge sense-agnostic Computer Use action loop"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "SciForge" }]
license = { text = "UNLICENSED" }
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["sciforge_computer_use*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

