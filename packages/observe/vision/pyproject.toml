[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sciforge-vision-sense"
version = "0.1.0"
description = "SciForge Vision Sense MVP contract package"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "SciForge" }]
license = { text = "UNLICENSED" }
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["sciforge_vision_sense*"]

[tool.unittest]
start-dir = "tests"
pattern = "test_*.py"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
